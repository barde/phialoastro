name = "phialo-design"
main = "src/index.ts"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "../phialo-design/dist"
binding = "ASSETS"

[build]
command = "npm run build"
cwd = "../phialo-design"

# Preview environment for branch deployments
[env.preview]
name = "phialo-design-preview"
workers_dev = true
compatibility_flags = ["nodejs_compat"]

[env.preview.vars]
ENVIRONMENT = "preview"
# Note: WEB3FORMS_ACCESS_KEY is passed during build via GitHub Actions

# Production environment
[env.production]
name = "phialo-design"
route = "phialo.de/*"
zone_id = "YOUR_ZONE_ID"
workers_dev = false
compatibility_flags = ["nodejs_compat"]

[env.production.vars]
ENVIRONMENT = "production"
# Note: WEB3FORMS_ACCESS_KEY must be set in Cloudflare dashboard under Worker settings

[vars]
ENVIRONMENT = "development"

# Email service configuration using Resend
# Required secrets:
# - wrangler secret put RESEND_API_KEY (your Resend API key from https://resend.com)
# 
# Optional environment variables (can be set here or as secrets):
# - FROM_EMAIL: From email address (must be a verified domain in Resend)
# - FROM_NAME: Name to show in email (defaults to "Phialo Design")
# - TO_EMAIL: Email to receive contact form submissions (defaults to "info@phialo.de")

# Test environment for running tests
[env.test]
name = "phialo-design-test"
workers_dev = true
main = "src/index.ts" # Use full implementation for tests
compatibility_flags = ["nodejs_compat"]

[env.test.vars]
ENVIRONMENT = "test"